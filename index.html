<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Observability Resources</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: #111827;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    a {
      display: block;
      background: #1e293b;
      color: #93c5fd;
      text-decoration: none;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      transition: 0.2s;
    }

    a:hover {
      background: #334155;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Observability Resources</h1>

    <a href="https://opentelemetry.io/docs/specs/semconv/gen-ai/" target="_blank">
      OpenTelemetry GenAI Docs
    </a>

    <a href="https://github.com/traceloop/openllmetry" target="_blank">
      OpenLLMetry GitHub
    </a>

    <a href="https://github.com/grafana/helm-charts" target="_blank">
      LGTM Stack Helm Charts
    </a>

    <a href="https://github.com/open-telemetry/opentelemetry-helm-charts" target="_blank">
      OTel Collector Helm Chart
    </a>

  </div>

</html>
